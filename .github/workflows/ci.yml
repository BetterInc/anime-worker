name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git describe

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: anime-worker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: anime-worker.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: anime-worker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git describe

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Test config loading (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Create a test config file next to the binary
          mkdir -p test-config
          cat > test-config/config.toml << 'EOF'
          server_url = "https://test.example.com/api/anime"
          worker_id = "test-worker-id-12345"
          api_key = "test-api-key-xyz"
          worker_name = "CI Test Worker"
          heartbeat_interval_secs = 30
          EOF

          # Copy binary to test directory
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} test-config/

          # Try to load the config (should fail gracefully with missing Python)
          # We're just testing that config loading works, not that everything runs
          cd test-config
          ./${{ matrix.binary }} --config config.toml hardware || true

          # Verify it attempted to load the config by checking it doesn't complain about missing config
          ./${{ matrix.binary }} --config config.toml hardware 2>&1 | grep -v "No such file or directory.*config" || echo "Config loaded successfully"

      - name: Test config loading (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Create a test config file next to the binary
          New-Item -ItemType Directory -Force -Path test-config
          @"
          server_url = "https://test.example.com/api/anime"
          worker_id = "test-worker-id-12345"
          api_key = "test-api-key-xyz"
          worker_name = "CI Test Worker"
          heartbeat_interval_secs = 30
          "@ | Out-File -FilePath test-config/config.toml -Encoding UTF8

          # Copy binary to test directory
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} test-config/

          # Try to load the config (should fail gracefully with missing Python)
          # We're just testing that config loading works, not that everything runs
          cd test-config
          .\${{ matrix.binary }} --config config.toml hardware
          echo "Config loading test completed"
