name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: anime-worker
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: anime-worker
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: anime-worker
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cp -r python dist/python
          cp README.md dist/
          cd dist && tar czf ../anime-worker-${{ matrix.name }}.tar.gz .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cp -r python dist/python
          cp README.md dist/
          cd dist && tar czf ../anime-worker-${{ matrix.name }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anime-worker-${{ matrix.name }}
          path: anime-worker-${{ matrix.name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum anime-worker-linux-x86_64.tar.gz > SHA256SUMS
          sha256sum anime-worker-macos-x86_64.tar.gz >> SHA256SUMS
          sha256sum anime-worker-macos-arm64.tar.gz >> SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/anime-worker-linux-x86_64.tar.gz
            artifacts/anime-worker-macos-x86_64.tar.gz
            artifacts/anime-worker-macos-arm64.tar.gz
            artifacts/SHA256SUMS
